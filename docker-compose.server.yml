version: '3.8'

services:
  telegram-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: telegram-mcp-server
    env_file:
      - .env
    environment:
      # Override these or set in .env
      - MCP_SERVER_URL=${MCP_SERVER_URL}
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=8000
    ports:
      - "${MCP_SERVER_PORT:-8000}:8000"
    volumes:
      # Persist OAuth data and Telegram session across restarts
      - telegram-mcp-data:/app/data
    restart: unless-stopped

volumes:
  telegram-mcp-data:
